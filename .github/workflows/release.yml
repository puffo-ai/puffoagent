name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write   # create GitHub Releases + upload assets

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Verify tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF##*/}"            # v0.1.0
          TAG="${TAG#v}"                      # 0.1.0
          PY_VER=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "tag=$TAG  pyproject=$PY_VER"
          if [[ "$TAG" != "$PY_VER" ]]; then
            echo "::error::Tag $TAG does not match pyproject.toml version $PY_VER"
            exit 1
          fi

      - name: Build sdist + wheel
        run: python -m build

      - name: Sanity-check the sdist
        run: |
          pip install dist/*.whl
          puffoagent --help >/dev/null

      - name: Create GitHub Release + attach artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
          generate_release_notes: true
          draft: false
          prerelease: false
