# Example ~/.puffoagent/daemon.yml
#
# This is the daemon-wide config. Each agent has its own
# ~/.puffoagent/agents/<agent-id>/agent.yml that covers
# Mattermost connection, runtime kind, triggers, etc. — don't
# duplicate those here.
#
# Most users don't need to hand-edit this file:
#   - LLM API keys are set via `puffoagent init`.
#   - The `server:` block is populated by `puffoagent login`.
#   - Per-agent config goes through `puffoagent agent runtime ...`.

# Which provider the chat-local runtime uses by default. Agents can
# still override this in their own agent.yml via runtime.provider.
default_provider: "anthropic"  # "anthropic" | "openai" | "google"

anthropic:
  api_key: ""                    # https://console.anthropic.com/
  model:   "claude-sonnet-4-6"   # empty = provider default

openai:
  api_key: ""                    # https://platform.openai.com/
  model:   "gpt-4o"

# Populated by `puffoagent login`. The daemon uses this to pull the
# operator's agents list from the Puffo.ai server on every sync tick
# and mirror it into ~/.puffoagent/agents/.
#
# user_token / device_id / operator_username are all written by
# login — editing by hand is only useful for scripted installs.
server:
  url:                     ""    # e.g. https://app.puffo.ai
  user_token:              ""    # PAT or device-pairing token
  device_id:               ""    # set by `puffoagent login` (device flow)
  operator_username:       ""    # set by `puffoagent login` (GET /users/me)
  sync_interval_seconds:   30.0

# Optional: absolute path to a directory of shared Claude Code
# skills (*.md files or skill dirs) synced into every cli-local /
# cli-docker agent on worker start. Leave empty to skip.
skills_dir: ""

# Reconciler tick intervals. Lower = more responsive to agent.yml
# edits but more filesystem polling; defaults are fine for ~10s of
# agents.
reconcile_interval_seconds: 2.0
runtime_heartbeat_seconds:  5.0

# cli-docker resource caps applied to every agent container at
# `docker run` time. Empty (default) leaves containers uncapped —
# fine on a beefy host, but on a small Docker Desktop VM a single
# runaway claude can drain the VM's swap and starve sibling
# containers' read syscalls (kernel ENOMEM). Bound each container
# to give the kernel a clear blast radius.
#
# Sizing rule of thumb: with N agents on a VM of M MB, plus ~1 GiB
# kernel/cache headroom and ~1 GiB for any non-agent containers
# (postgres etc.), each agent gets (M - 2048) / N MB. Subtract a
# bit more for cold-boot peaks. On a 6 GiB VM with 7 agents that
# lands around 512m soft / 1.5g hard.
#
# Per-agent overrides live in agent.yml under
# `runtime.docker_memory_limit` / `runtime.docker_memory_reservation`
# — set there if a single heavy agent needs more headroom.
docker_memory_limit:        ""   # e.g. "1.5g" — hard ceiling, --memory
docker_memory_reservation:  ""   # e.g. "512m" — soft floor, --memory-reservation
